<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mi App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Bienvenido de nuevo</h2>
        
        <form method="POST" action="/api/auth/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" name="email" placeholder="Email" required
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" name="password" placeholder="Password" required
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 font-semibold transition duration-200">
                Entrar
            </button>
        </form>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-gray-300"></span></div>
            <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">O continúa con</span></div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <a href="/auth/login/google" 
                class="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition">
                <img class="h-5 w-5 mr-2" src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                Google
            </a>
        </div>

        <p class="mt-8 text-center text-sm text-gray-600">
            ¿No tienes cuenta? <a href="/auth/signup" class="text-indigo-600 font-medium hover:underline">Regístrate gratis</a>
        </p>
    </div>

</body>
</html>
